name: Deploy Documentation for Develop version
# When a push event occurs on the main branch, and the changes are in the documentation folder, the workflow is triggered
on:
  push:
    branches:
      - main
    paths:
      - 'documentation/**'
  workflow_dispatch:  # Manually Deploy Documentation from ``main`` branch

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.65.0
          frozen: true
          cache: true
          environments: docs
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v5
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - name: Build and Deploy
        working-directory: ./documentation
        run: |
          git fetch origin
          pixi run -e docs mike deploy --update-alias --push develop
