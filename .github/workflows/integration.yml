# Integration test actions

name: Integration

on:
  workflow_dispatch:
  workflow_call:

jobs:
  tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-compose-action@v2.2.0
      - uses: actions/checkout@v7.0.0
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.71.2
          frozen: true
          cache: true
          environments: test
          activate-environment: true
      - run: docker compose version
      - run: docker compose -f tests/docker-compose.yml up -d --wait
      # Setup test environment (creates SciCat backend user, instrument, proposal)
      - run: python tests/integration/setup_test_environment.py --data-dir test-data
      # Validate the generated config file
      - run: scicat_validate_ingestor_config tests/integration/config.test.yml
      # Run the ingestor tests
      - run: python tests/_scicat_ingestor.py --config tests/integration/config.test.yml --data-dir test-data
      # Run the health check tests
      - run: python tests/_scicat_healthcheck.py --config tests/integration/config.test.yml
      - run: docker compose -f tests/docker-compose.yml down
