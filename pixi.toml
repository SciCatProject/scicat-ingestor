[workspace]
name = "scicat-ingestor"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
python = "3.12.*"

[pypi-dependencies]
scicat-ingestor = { path = "./", editable = true }

# ==================== Tasks ====================

[tasks]
test = { cmd = "pytest tests/", default-environment = "test" }
lint = { cmd = "pre-commit run --all-files", default-environment = "lint" }
docs = { cmd = "mkdocs build -v -c", default-environment = "docs", cwd = "documentation" }

validate-config = { cmd = "scicat_validate_ingestor_config tests/integration/config.test.yml" }

[tasks.test-ingestor]
depends-on = "setup-up-test-env"
cmd = "python tests/_scicat_ingestor.py --config tests/integration/config.test.yml --data-dir test-data"

# ==================== Test feature ====================

[feature.test.pypi-dependencies]
scicat-ingestor = { path = "./", editable = true, extras = ["test"] }

# ==================== Lint feature ====================

[feature.lint.pypi-dependencies]
pre-commit = "*"
ruff = ">=0.15"

[feature.lint.tasks]
lint = "pre-commit run --all-files"
check = "ruff check ."
format = "ruff format ."

# ==================== Docs feature ====================

[feature.docs.pypi-dependencies]
scicat-ingestor = { path = "./", editable = true, extras = ["test", "docs"] }

# ==================== Environments ====================

[environments]
# Per-package test environments (include workspace dep features)
test = { features = ["test"], solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }
lint = { features = ["lint"], solve-group = "default" }
